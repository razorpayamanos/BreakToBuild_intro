<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Break the Wall</title>
  <!--
  ============================================================================
  Break the Wall - Stage 1 (standalone iteration build)
  ============================================================================

  WHAT THIS IS
  ------------
  This file IS the brick-wall component. Its only job is to render a 3D wall
  built from instances of Brick.glb, break it apart with real physics on
  click, dolly the camera through the cavity, then clean itself up. In Stage 2
  this exact logic becomes a Framer code component — nothing campaign-site
  related lives in here.

  ARCHITECTURE (Stage 1 vs Stage 2)
  ---------------------------------
  Stage 1 (this iteration build):
    index.html         the brick-wall component (you're reading it)
      └─ <iframe> ──▶  campaign-site.html   a stand-in for the Framer page
                                            so we can simulate "real site
                                            behind the wall" in a browser
  Stage 2 (Framer code component):
    The brick-wall logic ports to a single .tsx file. The iframe element
    is DELETED — the brick wall sits on top of the actual Framer page and
    the same reveal happens against that page natively.

  HOW TO RUN
  ----------
    cd <this folder>
    python3 -m http.server 8000
    # then open http://localhost:8000 in Chrome / Safari / Firefox

  Brick.glb AND campaign-site.html must sit in the same directory as this file.

  BROWSER SUPPORT
  ---------------
  Modern Chrome / Safari / Firefox. Requires:
    - ES modules           (top-level <script type="module">)
    - WebGL2               (Three.js renderer)
    - WebAssembly          (Rapier physics)
    - top-level await      (used to init Rapier WASM)

  TUNABLE CONSTANTS
  -----------------
  All defined at the top of the module below. The names mirror what will become
  Stage 2 Framer property controls.

    brickGlbUrl         where to load the brick mesh from (default ./Brick.glb)
    wallColumns         bricks across (default 20)
    wallRows            bricks tall   (default 12)
    explosionImpulse    base outward kick on each brick at click (default 8)
    cameraStartZ        camera Z before click (default 8)
    cameraEndZ          camera Z after push-through (default -2)
    dustParticleCount   particles in the dust burst (default 150)
    enableShake         camera shake on click (default true)
    enableSound         sound on click (default false; Stage 1 has no audio)
    buttonLabel         button text (default "Break the Wall")
    triggerMode         "button" | "wall-click" (default "button")

  SCOPE NOTES
  -----------
  - Stage 1 only. Stage 2 (Framer Code Component) is gated on explicit approval.
  - Mobile tuning, reduced-motion handling, and replay are intentionally not
    implemented; stub locations are commented inline.
  ============================================================================
-->
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* White so any margin Figma's proto viewer leaves around the frame
         reads as a clean page bg, not a black screen. */
      background: #ffffff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #f4f1ec;
    }

    canvas {
      display: block;
    }

    /* Loading state */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      background: #0a0a0c;
      color: #c8c2b8;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      z-index: 20;
      transition: opacity 400ms ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid #2a2826;
      border-top-color: #c8a070;
      border-radius: 50%;
      animation: spin 900ms linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Trigger button overlay */
    #trigger {
      position: fixed;
      left: 50%;
      top: 70vh;
      transform: translate(-50%, -50%);
      padding: 16px 36px;
      background: rgba(12, 10, 8, 0.72);
      color: #f4f1ec;
      border: 1.5px solid rgba(244, 241, 236, 0.9);
      border-radius: 2px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 500ms ease, transform 200ms ease, background 200ms ease;
      z-index: 5;
      user-select: none;
    }

    #trigger.visible {
      opacity: 1;
      animation: pulse 2400ms ease-in-out infinite;
    }

    #trigger:hover {
      background: rgba(28, 20, 16, 0.82);
      transform: translate(-50%, -50%) scale(1.03);
    }

    #trigger:active {
      transform: translate(-50%, -50%) scale(0.98);
    }

    #trigger.gone {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(244, 241, 236, 0.18);
      }

      50% {
        box-shadow: 0 0 0 14px rgba(244, 241, 236, 0);
      }
    }

    /* Vignette: crushes the corners while the wall is intact. Faded out the
       moment the user clicks so the campaign site behind isn't darkened. */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 75% 80% at 42% 55%,
          rgba(0, 0, 0, 0) 30%,
          rgba(0, 0, 0, 0.55) 70%,
          rgba(0, 0, 0, 0.92) 100%);
      opacity: 1;
      transition: opacity 700ms ease;
      z-index: 4;
    }
    #vignette.gone { opacity: 0; }

    /* Campaign site iframe — sits BEHIND the canvas at all times. Loads on
       page open so it's already painted by the time the wall breaks. As the
       canvas above turns transparent (alpha=true) and bricks fly off, the
       site becomes naturally visible through the gaps and the cavity. */
    #aftersite {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      z-index: 1;
    }

    /* The Three.js canvas sits above the iframe so the brick wall covers it.
       Pre-click the wall blocks the iframe; post-click cleanup() removes the
       canvas and the iframe is left as the only interactive layer. */
    canvas {
      position: relative;
      z-index: 2;
    }

    /* a11y / reduced-motion stub:
     A real implementation would short-circuit the explosion timeline
     and call onWallBroken() immediately. Not built in Stage 1. */

    /* ───────────────────────────────────────────────────────────────────
       Control panel — bottom-right, live physics tuning
       ─────────────────────────────────────────────────────────────────── */
    #cp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      max-height: calc(100vh - 40px);
      background: rgba(15, 15, 22, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      color: rgba(255, 255, 255, 0.92);
      z-index: 30;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55);
      user-select: none;
    }

    #cp.collapsed { width: auto; }
    #cp.collapsed .cp-body { display: none; }

    .cp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: background 200ms ease;
    }
    .cp-header:hover { background: rgba(255, 255, 255, 0.07); }

    .cp-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.86);
    }

    .cp-toggle {
      font-size: 9px;
      color: rgba(255, 200, 100, 0.7);
      transition: transform 250ms ease;
    }
    #cp.collapsed .cp-toggle { transform: rotate(-90deg); }

    .cp-body {
      padding: 8px 18px 18px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }
    .cp-body::-webkit-scrollbar { width: 6px; }
    .cp-body::-webkit-scrollbar-track { background: transparent; }
    .cp-body::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }

    .cp-section {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 200, 100, 0.65);
      margin: 18px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .cp-section:first-child { margin-top: 6px; }

    .cp-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 4px 12px;
      padding: 7px 0;
    }

    .cp-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.72);
      font-weight: 500;
    }

    .cp-value {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: #ffc94c;
      font-weight: 600;
      min-width: 38px;
      text-align: right;
    }

    .cp-row input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
      height: 4px;
      margin: 4px 0 0;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(
        to right,
        rgba(255, 200, 100, 0.55) 0%,
        rgba(255, 200, 100, 0.55) var(--fill, 50%),
        rgba(255, 255, 255, 0.10) var(--fill, 50%),
        rgba(255, 255, 255, 0.10) 100%
      );
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .cp-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ffc94c;
      border: 2px solid rgba(15, 15, 22, 0.95);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      transition: transform 100ms ease;
    }
    .cp-row input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    .cp-row input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ffc94c;
      border: 2px solid rgba(15, 15, 22, 0.95);
      border-radius: 50%;
      cursor: pointer;
    }

    .cp-button {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: rgba(255, 200, 100, 0.12);
      border: 1px solid rgba(255, 200, 100, 0.28);
      border-radius: 6px;
      color: #ffc94c;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;

      font-family: inherit;
    }
    .cp-button:hover { background: rgba(255, 200, 100, 0.22); }
    .cp-button:active { transform: scale(0.98); }
  </style>

<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading wall&hellip;</div>
  </div>
  <button id="trigger" type="button">Break the Wall</button>
  <div id="vignette"></div>
  <!--
    STAGE 1 ONLY: this iframe loads a local stand-in page so we can simulate
    "campaign site behind the wall" while iterating on the brick-wall
    component in the browser. In Stage 2 (Framer code component) this entire
    iframe element is REMOVED — the brick wall will sit on top of the actual
    Framer page and the reveal happens against that page natively.
  -->
  <iframe
    id="aftersite"
    title="Campaign site"
    src="./campaign-site.html"
    loading="eager"></iframe>

  <!-- Live physics tuning panel (Stage 1 dev tool — REMOVE for Stage 2 export) -->
  <div id="cp">
    <div class="cp-header">
      <span class="cp-title">Physics</span>
      <span class="cp-toggle">▼</span>
    </div>
    <div class="cp-body"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { GLTFLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import RAPIER from 'https://esm.sh/@dimforge/rapier3d-compat@0.14.0';

    // ---------------------------------------------------------------------------
    // Tunable constants (Stage 2: these become Framer property controls)
    // ---------------------------------------------------------------------------
    const brickGlbUrl = './Brick.glb';
    const wallColumns = 20;     // bricks across
    const wallRows = 12;        // bricks tall
    // Camera Z is now AUTO-FIT to the wall + viewport (see fitCameraToWall).
    // This initial value is just a sane fallback used until the wall is built.
    let cameraStartZ = 12;
    const cameraEndZ = -2;      // (unused — camera no longer dollies forward after the explosion)
    const dustParticleCount = 150; // dust burst particle count (currently disabled)
    const enableShake = true;
    const enableSound = false;
    const buttonLabel = 'Break the Wall';
    // 'wall-click' = clicking a brick breaks the wall from THAT contact point.
    // 'button'     = clicking the button breaks from the wall center.
    const triggerMode = 'wall-click';

    // ─── Mouse interactivity ──────────────────────────────────────────────
    // Hovering near a brick pushes it forward in Z (toward the camera) — a
    // "magnetic" feel where the wall surface deforms toward the cursor with a
    // smooth radial falloff. Clicking on a brick fires the wall-break from
    // that contact point.
    // ⚠️ The values below are LIVE-EDITABLE via the bottom-right control panel
    //   (let, not const, so the panel sliders can mutate them at runtime).
    let PROXIMITY_RADIUS = 2.0;         // bricks within this distance of cursor are nudged forward
    let PROXIMITY_MAX_OFFSET = 0.45;    // peak Z displacement (units toward camera)
    let PROXIMITY_LERP = 0.18;          // smoothing factor per frame

    // ─── Wall-break physics (researched, not just an "explosion") ────────
    // Real masonry fails by mortar fracture propagating outward from impact
    // as a shockwave. Bricks near the impact get a strong outward impulse;
    // bricks farther away mostly LOSE SUPPORT and fall under gravity — they
    // don't fly outward. Modeled as:
    //   - exponential force falloff with distance (much steeper than linear)
    //   - time-delayed activation (visible cascade) at a slow shockwave speed
    //   - elevated gravity for snappy weight (visual scale ≠ real-world)
    //   - per-brick linear + angular damping so bricks settle, don't skate
    //   - collision groups: still-kinematic bricks don't deflect dynamic ones
    // (Live-editable via panel — see physics state object below)
    let SHOCK_RADIUS = 6.0;
    let SHOCK_PROPAGATION_SPEED = 28;
    let SHOCK_IMPULSE_BASE = 55;
    let SHOCK_FALLOFF_SCALE = 2.0;
    let GRAVITY = 18;                     // m/s² — slower than 28 (which was too fast). 18 reads as ~5kg brick weight.
    let BRICK_DENSITY = 2.4;
    let BRICK_FRICTION = 0.85;
    let BRICK_RESTITUTION = 0;            // bricks do NOT bounce — purely inelastic collisions
    let BRICK_LINEAR_DAMPING = 0.04;
    let BRICK_ANGULAR_DAMPING = 0.30;

    // Collision groups: high 16 bits = membership, low 16 bits = filter mask.
    // Two colliders interact iff (A.member & B.filter) ≠ 0 AND vice versa.
    // We give kinematic bricks a filter that ONLY includes the ground, so
    // dynamic bricks (already activated) can fly past their not-yet-activated
    // neighbors during the cascade without bouncing off them.
    const GROUP_KINEMATIC = (1 << 16) | 4;  // member 1, filter 4 (ground only)
    const GROUP_DYNAMIC   = (2 << 16) | 6;  // member 2, filter 4|2 (ground + other dynamic)
    const GROUP_GROUND    = (4 << 16) | 3;  // member 4, filter 1|2 (kinematic + dynamic)

    // Internal timing (ms, relative to click)
    const T_SHAKE_MS = 300;
    // Time from click to when the canvas is removed. Long enough for every
    // brick to finish its fall — at GRAVITY=18 the cascade plus settling takes
    // 2.5–3.5s, so we keep a generous window and let the panel tune it.
    let T_TOTAL_MS = 3500;

    // Mortar gap (kept minimal so the iframe behind doesn't leak through seams)
    const MORTAR_GAP = 0.005;

    // ─── Persisted physics tuning (localStorage) ─────────────────────────
    // Keys saved across reloads so the user's tuned values come back on load.
    // Versioned in case we change the schema; bump the suffix to invalidate.
    const STORAGE_KEY = 'breakwall-physics-v1';

    function loadPersistedValues() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (typeof s.SHOCK_IMPULSE_BASE      === 'number') SHOCK_IMPULSE_BASE      = s.SHOCK_IMPULSE_BASE;
        if (typeof s.SHOCK_RADIUS            === 'number') SHOCK_RADIUS            = s.SHOCK_RADIUS;
        if (typeof s.SHOCK_PROPAGATION_SPEED === 'number') SHOCK_PROPAGATION_SPEED = s.SHOCK_PROPAGATION_SPEED;
        if (typeof s.GRAVITY                 === 'number') GRAVITY                 = s.GRAVITY;
        if (typeof s.PROXIMITY_RADIUS        === 'number') PROXIMITY_RADIUS        = s.PROXIMITY_RADIUS;
        if (typeof s.PROXIMITY_MAX_OFFSET    === 'number') PROXIMITY_MAX_OFFSET    = s.PROXIMITY_MAX_OFFSET;
      } catch (_) { /* corrupt storage — fall back to defaults */ }
    }

    function persistValues() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          SHOCK_IMPULSE_BASE,
          SHOCK_RADIUS,
          SHOCK_PROPAGATION_SPEED,
          GRAVITY,
          PROXIMITY_RADIUS,
          PROXIMITY_MAX_OFFSET,
        }));
      } catch (_) { /* storage disabled — silently skip */ }
    }

    // Load BEFORE Rapier so the world picks up the persisted gravity, and
    // BEFORE brick body creation so densities/damping defaults reflect prefs.
    loadPersistedValues();

    // ---------------------------------------------------------------------------
    // Boot: init physics WASM, then build everything
    // ---------------------------------------------------------------------------
    await RAPIER.init();

    const triggerBtn = document.getElementById('trigger');
    const loadingEl = document.getElementById('loading');
    const aftersiteEl = document.getElementById('aftersite');
    const vignetteEl = document.getElementById('vignette');
    triggerBtn.textContent = buttonLabel;

    // ---------------------------------------------------------------------------
    // Three.js setup
    // ---------------------------------------------------------------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0); // fully transparent — iframe shows through
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    // No scene.background — keep the canvas transparent so the iframe behind
    // it is visible through any pixel that isn't covered by a brick.
    // No fog — the CSS vignette handles depth-cueing/corner darkening cleanly.

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, cameraStartZ);
    camera.lookAt(0, 0, 0);

    // Lighting: clean, even, slightly raked. The reference's bright-center / dark-
    // corner falloff is delivered by the CSS #vignette overlay; the 3D lights just
    // give bricks honest form and a touch of directionality so the embossed text
    // reads. Neutral whites — no warm/cool tint.
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
    keyLight.position.set(-3, 4, 9);
    keyLight.target.position.set(0, 0, 0);
    scene.add(keyLight);
    scene.add(keyLight.target);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 1;
    keyLight.shadow.camera.far = 40;
    keyLight.shadow.camera.left = -30;
    keyLight.shadow.camera.right = 30;
    keyLight.shadow.camera.top = 10;
    keyLight.shadow.camera.bottom = -10;
    keyLight.shadow.bias = -0.0005;

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.55);
    fillLight.position.set(4, -2, 7);
    scene.add(fillLight);

    const ambient = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambient);

    // Back-light: positioned behind the wall, facing forward. While the wall is
    // intact this lights the back faces (we don't see it). After the explosion,
    // tumbling debris gets rim-lit from behind and the cavity opens onto a hot
    // white core — implying light pouring forward from the campaign site.
    const backLight = new THREE.DirectionalLight(0xffffff, 1.8);
    backLight.position.set(0, 0, -8);
    backLight.target.position.set(0, 0, 5);
    scene.add(backLight);
    scene.add(backLight.target);

    const backGlow = new THREE.PointLight(0xffffff, 6, 18, 1.6);
    backGlow.position.set(0, 0, -2.5);
    scene.add(backGlow);

    // ---------------------------------------------------------------------------
    // Load the brick GLB and extract a normalized geometry + material
    // ---------------------------------------------------------------------------
    const loader = new GLTFLoader();
    const gltf = await loader.loadAsync(brickGlbUrl);

    let sourceMesh = null;
    gltf.scene.traverse((o) => { if (!sourceMesh && o.isMesh) sourceMesh = o; });
    if (!sourceMesh) throw new Error('Brick.glb has no mesh');
    sourceMesh.updateMatrixWorld(true);

    // Bake parent transforms into geometry, then recenter at origin so each
    // instance's pose maps cleanly to a Rapier body pose.
    const brickGeometry = sourceMesh.geometry.clone();
    brickGeometry.applyMatrix4(sourceMesh.matrixWorld);
    brickGeometry.computeBoundingBox();
    const bbCenter = new THREE.Vector3();
    brickGeometry.boundingBox.getCenter(bbCenter);
    brickGeometry.translate(-bbCenter.x, -bbCenter.y, -bbCenter.z);
    brickGeometry.computeBoundingBox();
    const brickSize = new THREE.Vector3();
    brickGeometry.boundingBox.getSize(brickSize);
    const halfExtents = { x: brickSize.x / 2, y: brickSize.y / 2, z: brickSize.z / 2 };

    // The GLB material is set with alphaMode=BLEND + double-sided. For an opaque
    // brick that breaks depth sorting on a 240-instance mesh, force opaque.
    // Texture is preserved as-is (the GLB ships with the BREAK TO BUILD branding).
    const brickMaterial = sourceMesh.material.clone();
    brickMaterial.transparent = false;
    brickMaterial.depthWrite = true;
    brickMaterial.side = THREE.FrontSide;
    if (brickMaterial.map) brickMaterial.map.colorSpace = THREE.SRGBColorSpace;

    // ---------------------------------------------------------------------------
    // Build the wall (running-bond pattern, instanced)
    // ---------------------------------------------------------------------------
    const dx = brickSize.x + MORTAR_GAP;
    const dy = brickSize.y + MORTAR_GAP;
    const wallTotalH = wallRows * dy;
    const wallTotalW = wallColumns * dx;
    const brickCount = wallColumns * wallRows;

    const instancedMesh = new THREE.InstancedMesh(brickGeometry, brickMaterial, brickCount);
    instancedMesh.castShadow = true;
    instancedMesh.receiveShadow = true;
    instancedMesh.frustumCulled = false; // bricks fly far at explode time
    scene.add(instancedMesh);

    // No mortar plane — it would block the iframe behind the wall. With
    // MORTAR_GAP set to 0.005 the seams between bricks are essentially zero
    // visual width, so no iframe shows through pre-explosion.

    // ---------------------------------------------------------------------------
    // Rapier physics
    // ---------------------------------------------------------------------------
    const world = new RAPIER.World({ x: 0, y: -GRAVITY, z: 0 });

    // Static ground far below — debris always lands somewhere
    const groundY = -wallTotalH / 2 - 6;
    const groundDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(0, groundY, 0);
    const groundBody = world.createRigidBody(groundDesc);
    const groundColliderDesc = RAPIER.ColliderDesc.cuboid(80, 0.5, 40)
      .setFriction(BRICK_FRICTION)
      .setRestitution(BRICK_RESTITUTION)
      .setCollisionGroups(GROUP_GROUND);
    const groundCollider = world.createCollider(groundColliderDesc, groundBody);

    // Per-brick: kinematicPositionBased (rock-still under gravity) until click.
    // We also track each brick's REST position so:
    //   - hover proximity can lerp brick.z back/forward relative to rest
    //   - the cascade can compute distance from any chosen impact origin
    const brickBodies = [];
    const brickRestPositions = []; // THREE.Vector3 per brick
    const brickActivated = [];     // flips to true when the brick goes Dynamic
    const brickDelays = [];        // ms after click when each brick activates

    const tmpMat = new THREE.Matrix4();
    const tmpQuat = new THREE.Quaternion();
    const tmpScale = new THREE.Vector3(1, 1, 1);
    const tmpPos = new THREE.Vector3();

    for (let row = 0; row < wallRows; row++) {
      const rowOffset = (row % 2 === 1) ? dx * 0.5 : 0;
      for (let col = 0; col < wallColumns; col++) {
        const i = row * wallColumns + col;
        const x = (col - (wallColumns - 1) / 2) * dx + rowOffset;
        const y = (row - (wallRows - 1) / 2) * dy;
        const z = 0;

        tmpPos.set(x, y, z);
        tmpQuat.identity();
        tmpMat.compose(tmpPos, tmpQuat, tmpScale);
        instancedMesh.setMatrixAt(i, tmpMat);

        const bodyDesc = RAPIER.RigidBodyDesc.kinematicPositionBased()
          .setTranslation(x, y, z)
          .setLinearDamping(BRICK_LINEAR_DAMPING)
          .setAngularDamping(BRICK_ANGULAR_DAMPING)
          .setCcdEnabled(true); // prevent fast bricks from tunneling through ground
        const body = world.createRigidBody(bodyDesc);
        const colDesc = RAPIER.ColliderDesc
          .cuboid(halfExtents.x, halfExtents.y, halfExtents.z)
          .setDensity(BRICK_DENSITY)
          .setFriction(BRICK_FRICTION)
          .setRestitution(BRICK_RESTITUTION)
          .setCollisionGroups(GROUP_KINEMATIC); // only collides with ground while kinematic
        world.createCollider(colDesc, body);
        brickBodies.push(body);
        brickRestPositions.push(new THREE.Vector3(x, y, z));
        brickActivated.push(false);
        brickDelays.push(0);
      }
    }
    instancedMesh.instanceMatrix.needsUpdate = true;

    // InstancedMesh raycasting needs both bounds on the geometry. computeBoundingBox
    // is already done; sphere is required for the broad-phase.
    brickGeometry.computeBoundingSphere();

    // ─── Auto-fit camera so the wall ALWAYS covers the viewport ──────────
    // Compute the camera Z that just barely fits the wall in the viewport
    // (use the limiting dimension — height OR width, whichever needs the
    // closer camera). A small overshoot factor (0.96) ensures the wall
    // exceeds the viewport in the limiting dimension by ~4%, so we never
    // see edge gaps from rounding or tiny resize jitter.
    function fitCameraToWall() {
      const fovRad = THREE.MathUtils.degToRad(camera.fov);
      const tanHalfFov = Math.tan(fovRad / 2);
      const viewportAspect = window.innerWidth / window.innerHeight;
      const dHeight = wallTotalH / (2 * tanHalfFov);
      const dWidth  = wallTotalW / (2 * tanHalfFov * viewportAspect);
      const d = Math.min(dHeight, dWidth) * 0.96;
      camera.position.set(0, 0, d);
      cameraStartZ = d;
    }
    fitCameraToWall();

    // ---------------------------------------------------------------------------
    // Dust particles (THREE.Points, runtime-generated soft circle alpha)
    // ---------------------------------------------------------------------------
    function makeSoftDiscTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 64;
      const g = c.getContext('2d');
      const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32);
      grd.addColorStop(0.0, 'rgba(255,255,255,1)');
      grd.addColorStop(0.4, 'rgba(255,255,255,0.55)');
      grd.addColorStop(1.0, 'rgba(255,255,255,0)');
      g.fillStyle = grd;
      g.fillRect(0, 0, 64, 64);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const dustGeo = new THREE.BufferGeometry();
    const dustPositions = new Float32Array(dustParticleCount * 3);
    const dustVelocities = new Float32Array(dustParticleCount * 3);
    const dustAges = new Float32Array(dustParticleCount); // -1 means inactive
    for (let i = 0; i < dustParticleCount; i++) dustAges[i] = -1;
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));

    const dustMat = new THREE.PointsMaterial({
      size: 0.9,
      map: makeSoftDiscTexture(),
      color: 0xc8b89a,
      transparent: true,
      opacity: 0.0,
      depthWrite: false,
      blending: THREE.NormalBlending,
      sizeAttenuation: true,
    });
    const dustPoints = new THREE.Points(dustGeo, dustMat);
    dustPoints.frustumCulled = false;
    dustPoints.visible = false; // hidden until the explosion emits the burst
    scene.add(dustPoints);

    // ---------------------------------------------------------------------------
    // Animation state machine
    // ---------------------------------------------------------------------------
    let stage = 'idle';     // 'idle' | 'exploding' | 'done'
    let clickTime = 0;
    let dustEmitted = false;
    let onWallBrokenFired = false;
    const cameraBase = new THREE.Vector3().copy(camera.position);

    // Origin of the next explosion — set on click via raycast hit point.
    // Defaults to wall center until then (so the button trigger has a sane
    // origin if used).
    const explosionOrigin = new THREE.Vector3(0, 0, 0);

    // ─── Mouse / raycasting state ────────────────────────────────────────
    // mouseNDC starts way off-screen so the first frame doesn't mass-attract
    // bricks toward (0,0) before the user has moved their cursor.
    const raycaster = new THREE.Raycaster();
    const mouseNDC = new THREE.Vector2(99999, 99999);
    const cursorOnWall = new THREE.Vector3(99999, 99999, 0);
    const wallPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    let mouseInsideWindow = false;

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }
    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }
    // Smoothstep — used for the proximity falloff curve. 0..1 in, 0..1 out
    // with zero-derivative at both ends — gives a clean plateau over the
    // hovered brick and a soft falloff to neighbors.
    function smoothstep(t) {
      return t * t * (3 - 2 * t);
    }

    function emitDustBurst() {
      for (let i = 0; i < dustParticleCount; i++) {
        // Position: random point within the wall plane (slightly thickened)
        const px = (Math.random() - 0.5) * wallTotalW * 0.95;
        const py = (Math.random() - 0.5) * wallTotalH * 0.95;
        const pz = (Math.random() - 0.5) * 0.4;
        dustPositions[i * 3 + 0] = px;
        dustPositions[i * 3 + 1] = py;
        dustPositions[i * 3 + 2] = pz;

        const dir = new THREE.Vector3(px, py, pz).sub(explosionOrigin);
        const dist = Math.max(dir.length(), 0.001);
        dir.divideScalar(dist);
        const speed = 2 + Math.random() * 4;
        dustVelocities[i * 3 + 0] = dir.x * speed + (Math.random() - 0.5) * 1.5;
        dustVelocities[i * 3 + 1] = dir.y * speed + Math.random() * 1.2 + 0.3;
        dustVelocities[i * 3 + 2] = dir.z * speed + Math.random() * 1.0 + 0.2;
        dustAges[i] = 0;
      }
      dustGeo.attributes.position.needsUpdate = true;
      dustMat.opacity = 0.85;
      dustPoints.visible = true;
      dustEmitted = true;
    }

    // ─── Mouse → world helpers ───────────────────────────────────────────
    function setMouseFromEvent(e) {
      mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
      mouseInsideWindow = true;
    }

    // Project the current mouseNDC onto the wall plane (z=0) in world space.
    // Used by the hover-proximity effect.
    function updateCursorOnWall() {
      if (!mouseInsideWindow) {
        cursorOnWall.set(99999, 99999, 0);
        return;
      }
      raycaster.setFromCamera(mouseNDC, camera);
      if (!raycaster.ray.intersectPlane(wallPlane, cursorOnWall)) {
        cursorOnWall.set(99999, 99999, 0);
      }
    }

    // For a click event: try the InstancedMesh first (most accurate — picks
    // the actual visible brick, even with proximity Z offsets). Fall back to
    // wall-plane raycast so a click between bricks still triggers from the
    // approximate wall point.
    function pickWallContactPoint(e) {
      setMouseFromEvent(e);
      raycaster.setFromCamera(mouseNDC, camera);
      const hits = raycaster.intersectObject(instancedMesh, false);
      if (hits.length > 0 && hits[0].point) {
        return hits[0].point.clone();
      }
      const planePt = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(wallPlane, planePt)) {
        return planePt;
      }
      return null;
    }

    // ─── Hover proximity update (idle stage only) ────────────────────────
    // Each frame: find the cursor's world position on the wall plane, then
    // for every still-kinematic brick, lerp its Z toward (rest.z + offset)
    // where offset peaks under the cursor and falls off smoothly within
    // PROXIMITY_RADIUS. X and Y are pinned to the rest position — bricks
    // don't slide around, they only push out toward the camera.
    function updateProximity() {
      if (stage !== 'idle') return;
      updateCursorOnWall();

      const cx = cursorOnWall.x;
      const cy = cursorOnWall.y;
      for (let i = 0; i < brickBodies.length; i++) {
        const rest = brickRestPositions[i];
        const dx2 = rest.x - cx;
        const dy2 = rest.y - cy;
        const dist = Math.hypot(dx2, dy2);

        let targetOffset = 0;
        if (dist < PROXIMITY_RADIUS) {
          const t = 1 - dist / PROXIMITY_RADIUS;
          targetOffset = PROXIMITY_MAX_OFFSET * smoothstep(t);
        }

        const body = brickBodies[i];
        const cur = body.translation();
        const targetZ = rest.z + targetOffset;
        const newZ = cur.z + (targetZ - cur.z) * PROXIMITY_LERP;
        body.setTranslation({ x: rest.x, y: rest.y, z: newZ }, false);
      }
    }

    // ─── fireExplosion: set up the cascade — DON'T activate everything ───
    // Computes a per-brick delay based on distance from the impact origin,
    // simulating a slow shockwave radiating outward. The render loop
    // (updateExplosionCascade) flips bricks to Dynamic + applies impulses
    // as their delays elapse. This produces a visible break-from-contact.
    function fireExplosion(origin) {
      if (stage !== 'idle') return;
      stage = 'exploding';
      clickTime = performance.now();
      triggerBtn.classList.add('gone');
      vignetteEl.classList.add('gone');

      try {
        if (aftersiteEl.contentWindow) {
          aftersiteEl.contentWindow.postMessage({ type: 'wall-broken' }, '*');
        }
      } catch (_) { /* iframe not ready — fine */ }

      explosionOrigin.copy(origin);

      for (let i = 0; i < brickBodies.length; i++) {
        const rest = brickRestPositions[i];
        const distance = origin.distanceTo(rest);
        brickDelays[i] = (distance / SHOCK_PROPAGATION_SPEED) * 1000;
        brickActivated[i] = false;
      }

      // Dust burst disabled per design direction.
      // emitDustBurst();

      if (enableSound) {
        // TODO Stage 2: preload CC0 thud and play one-shot here.
      }
    }

    // ─── Cascade activation: flip each brick to Dynamic when its turn comes ─
    // Bricks within SHOCK_RADIUS of the origin get a strong outward impulse
    // (with exponential falloff in distance — physically more accurate than
    // the previous linear falloff) plus an angular impulse to tumble. Bricks
    // outside the shock radius get NO outward impulse — they just lose
    // support and fall under gravity, which is how walls actually collapse.
    function updateExplosionCascade(now) {
      if (stage !== 'exploding') return;
      const tMs = now - clickTime;

      for (let i = 0; i < brickBodies.length; i++) {
        if (brickActivated[i]) continue;
        if (tMs < brickDelays[i]) continue;
        activateBrick(i);
        brickActivated[i] = true;
      }
    }

    const _impulseVec = new THREE.Vector3();
    const _dirVec = new THREE.Vector3();
    const _jitterAxis = new THREE.Vector3();
    function activateBrick(i) {
      const body = brickBodies[i];
      // Switch to Dynamic and to the dynamic collision group so it now
      // collides with the ground and other dynamic bricks, but ignores the
      // remaining kinematic neighbors (no bouncing off un-broken wall).
      body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
      const collider = body.collider(0);
      if (collider) collider.setCollisionGroups(GROUP_DYNAMIC);

      const t = body.translation();
      const dx2 = t.x - explosionOrigin.x;
      const dy2 = t.y - explosionOrigin.y;
      const dz2 = t.z - explosionOrigin.z;
      const dist = Math.max(Math.hypot(dx2, dy2, dz2), 0.001);

      if (dist < SHOCK_RADIUS) {
        // Inside the shock zone: aggressive outward impulse with exponential
        // falloff. Bricks at the contact point get the full SHOCK_IMPULSE_BASE
        // launch + heavy forward/upward bias (debris explodes toward the
        // camera, like a real impact pressure wave exiting the cavity).
        // Per-brick chaos: each brick's magnitude, direction, and bias are
        // randomized independently so no two bricks fly the same way.
        const falloff = Math.exp(-dist / SHOCK_FALLOFF_SCALE);
        const magJitter = 0.7 + Math.random() * 0.6;             // ±30% magnitude
        // 15% of bricks get an extra "shrapnel" boost — chunks that fly hard
        // and far, like the random violent fragments in a real impact.
        const extraBoost = Math.random() < 0.15 ? (1.6 + Math.random() * 0.8) : 1.0;
        const mag = SHOCK_IMPULSE_BASE * falloff * magJitter * extraBoost;

        // Outward direction with ±~12° angular jitter so bricks scatter
        // instead of all flying perfectly radially from the origin.
        const baseDir = _dirVec.set(dx2 / dist, dy2 / dist, dz2 / dist);
        const jitterAxis = _jitterAxis
          .set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5)
          .normalize();
        baseDir.applyAxisAngle(jitterAxis, (Math.random() - 0.5) * 0.42);

        // Per-brick bias variation — each brick has its own up/forward kick.
        const upBiasV  = 0.45 * (0.55 + Math.random() * 0.9);
        const fwdBiasV = 0.95 * (0.55 + Math.random() * 0.9);

        _impulseVec.set(
          baseDir.x * mag,
          (baseDir.y + upBiasV) * mag,
          (baseDir.z * 0.45 + fwdBiasV) * mag
        );
        body.applyImpulse({ x: _impulseVec.x, y: _impulseVec.y, z: _impulseVec.z }, true);

        // Tumble — wider random torque, steeper scaling with proximity.
        // Lower angular damping (0.30) lets these spins persist through fall.
        const torqueMag = 2.5 + falloff * 13;
        body.applyTorqueImpulse({
          x: (Math.random() - 0.5) * torqueMag,
          y: (Math.random() - 0.5) * torqueMag,
          z: (Math.random() - 0.5) * torqueMag,
        }, true);
      } else {
        // Outside the shock zone: bricks have lost support and are dropping.
        // Add real random variation (was nearly zero before — that's why the
        // outer fall looked monotonic) so each brick falls differently.
        // Some go sideways, some forward, some tumble heavily.
        body.applyImpulse({
          x: (Math.random() - 0.5) * 1.8,
          y: (Math.random() - 0.5) * 0.9 - 0.2,        // slight downward bias (gravity-assist)
          z: (Math.random() - 0.5) * 1.2 + 0.35,        // slight forward bias
        }, true);
        body.applyTorqueImpulse({
          x: (Math.random() - 0.5) * 3.5,
          y: (Math.random() - 0.5) * 3.5,
          z: (Math.random() - 0.5) * 3.5,
        }, true);
      }
    }

    // ---------------------------------------------------------------------------
    // Render loop
    // ---------------------------------------------------------------------------
    let rafId = null;
    let lastFrameTime = performance.now();

    const tmpMat2 = new THREE.Matrix4();
    const tmpPos2 = new THREE.Vector3();
    const tmpQuat2 = new THREE.Quaternion();

    function syncInstancesFromPhysics() {
      for (let i = 0; i < brickBodies.length; i++) {
        const body = brickBodies[i];
        const t = body.translation();
        const r = body.rotation();
        tmpPos2.set(t.x, t.y, t.z);
        tmpQuat2.set(r.x, r.y, r.z, r.w);
        tmpMat2.compose(tmpPos2, tmpQuat2, tmpScale);
        instancedMesh.setMatrixAt(i, tmpMat2);
      }
      instancedMesh.instanceMatrix.needsUpdate = true;
    }

    function updateDust(dt) {
      if (!dustEmitted) return;
      let anyAlive = false;
      for (let i = 0; i < dustParticleCount; i++) {
        if (dustAges[i] < 0) continue;
        dustAges[i] += dt;
        if (dustAges[i] > 1.5) { dustAges[i] = -1; continue; }
        anyAlive = true;
        dustPositions[i * 3 + 0] += dustVelocities[i * 3 + 0] * dt;
        dustPositions[i * 3 + 1] += dustVelocities[i * 3 + 1] * dt;
        dustPositions[i * 3 + 2] += dustVelocities[i * 3 + 2] * dt;
        // Drag + gravity for dust
        dustVelocities[i * 3 + 0] *= 0.96;
        dustVelocities[i * 3 + 1] = dustVelocities[i * 3 + 1] * 0.97 - 0.4 * dt;
        dustVelocities[i * 3 + 2] *= 0.96;
      }
      dustGeo.attributes.position.needsUpdate = true;
      // Global opacity falls with the oldest particles' age
      const avgFade = Math.max(...dustAges) >= 0 ? Math.max(...dustAges) / 1.5 : 1;
      dustMat.opacity = anyAlive ? 0.85 * (1 - Math.min(avgFade, 1)) : 0;
    }

    function updateAnimationStage(now) {
      if (stage !== 'exploding') return;
      const t = now - clickTime;

      // Brief camera shake on impact (0..T_SHAKE_MS), ease-out decay.
      // Camera position otherwise stays put — no dolly/zoom animation. The
      // iframe behind the canvas is revealed naturally as the bricks fly
      // away and expose transparent canvas pixels.
      if (enableShake && t < T_SHAKE_MS) {
        const decay = 1 - easeOutCubic(t / T_SHAKE_MS);
        camera.position.x = cameraBase.x + (Math.random() - 0.5) * 0.1 * decay;
        camera.position.y = cameraBase.y + (Math.random() - 0.5) * 0.1 * decay;
      } else {
        camera.position.x = cameraBase.x;
        camera.position.y = cameraBase.y;
      }
      camera.position.z = cameraBase.z;

      // Done: fire callback once, run cleanup
      if (t >= T_TOTAL_MS && !onWallBrokenFired) {
        onWallBrokenFired = true;
        stage = 'done';
        onWallBroken();
      }
    }

    function animate() {
      rafId = requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
      lastFrameTime = now;

      // Update kinematic positions BEFORE the physics step so the engine
      // sees the new state when stepping the world.
      if (stage === 'idle') {
        updateProximity();
      } else if (stage === 'exploding') {
        updateExplosionCascade(now);
      }

      world.step();
      syncInstancesFromPhysics();
      updateDust(dt);
      updateAnimationStage(now);

      renderer.render(scene, camera);
    }

    // ---------------------------------------------------------------------------
    // Hand-off + cleanup
    // ---------------------------------------------------------------------------
    function onWallBroken() {
      // The iframe has been visible (behind the canvas) the whole time. Once
      // the canvas is removed in cleanup(), the iframe is the only layer and
      // becomes interactive. Stage 2: invoke a prop callback here for Framer.
      cleanup();
    }

    function cleanup() {
      if (rafId !== null) cancelAnimationFrame(rafId);
      rafId = null;

      scene.traverse((obj) => {
        if (obj.isMesh || obj.isPoints || obj.isInstancedMesh) {
          if (obj.geometry) obj.geometry.dispose();
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          for (const m of mats) {
            if (!m) continue;
            for (const k of ['map', 'normalMap', 'roughnessMap', 'metalnessMap', 'aoMap', 'emissiveMap']) {
              if (m[k]) m[k].dispose();
            }
            m.dispose();
          }
        }
      });

      renderer.dispose();
      if (renderer.domElement && renderer.domElement.parentNode) {
        renderer.domElement.parentNode.removeChild(renderer.domElement);
      }

      world.free();
    }

    // ---------------------------------------------------------------------------
    // Wire up the trigger, mouse interactions, and resize
    // ---------------------------------------------------------------------------
    function bindTrigger() {
      // Always track the mouse so the hover-proximity effect runs during idle.
      window.addEventListener('mousemove', setMouseFromEvent);
      window.addEventListener('mouseout', (e) => {
        // mouseout with no relatedTarget == cursor left the window entirely.
        if (!e.relatedTarget && !e.toElement) mouseInsideWindow = false;
      });

      if (triggerMode === 'wall-click') {
        renderer.domElement.style.cursor = 'pointer';
        renderer.domElement.addEventListener('click', (e) => {
          if (stage !== 'idle') return;
          const point = pickWallContactPoint(e);
          if (point) fireExplosion(point);
        });
        triggerBtn.classList.add('gone');
      } else {
        // Button mode: fire from wall center.
        triggerBtn.addEventListener(
          'click',
          () => fireExplosion(new THREE.Vector3(0, 0, 0)),
          { once: true }
        );
      }
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      // Re-fit so the wall continues to cover the viewport at the new aspect.
      fitCameraToWall();
      cameraBase.copy(camera.position);
    });

    // ---------------------------------------------------------------------------
    // Go
    // ---------------------------------------------------------------------------
    loadingEl.classList.add('hidden');
    setTimeout(() => loadingEl.remove(), 500);

    // In wall-click mode the button is hidden by .gone in bindTrigger().
    // Only fade it in if button mode is active.
    if (triggerMode === 'button') {
      setTimeout(() => triggerBtn.classList.add('visible'), 500);
    }

    bindTrigger();
    animate();

    // ─────────────────────────────────────────────────────────────────
    // Control panel — live tuning (Stage 1 dev tool)
    //
    // Each control reads/writes one of the `let` bindings up top. Some
    // also propagate the change into Rapier (gravity → world.gravity,
    // damping/friction/restitution → existing colliders), so changes are
    // visible without rebuilding the wall.
    // ─────────────────────────────────────────────────────────────────
    function buildControlPanel() {
      const panel = document.getElementById('cp');
      const body  = panel.querySelector('.cp-body');

      panel.querySelector('.cp-header').addEventListener('click', () => {
        panel.classList.toggle('collapsed');
      });

      // The six controls that actually move the look of the simulation.
      // Other knobs (damping, friction, restitution, falloff, cleanup, etc.)
      // were removed for clarity — they live in code defaults if you need them.
      const sections = [
        {
          title: 'Explosion',
          controls: [
            { label: 'Impulse',       min: 5,   max: 120, step: 1,   fmt: 0,
              get: () => SHOCK_IMPULSE_BASE,
              set: v => { SHOCK_IMPULSE_BASE = v; } },
            { label: 'Blast radius',  min: 0.5, max: 20,  step: 0.1, fmt: 1,
              get: () => SHOCK_RADIUS,
              set: v => { SHOCK_RADIUS = v; } },
            { label: 'Cascade speed', min: 5,   max: 80,  step: 1,   fmt: 0,
              get: () => SHOCK_PROPAGATION_SPEED,
              set: v => { SHOCK_PROPAGATION_SPEED = v; } },
          ],
        },
        {
          title: 'Falling',
          controls: [
            { label: 'Gravity',       min: 5,   max: 60,  step: 0.5, fmt: 1,
              get: () => GRAVITY,
              set: v => { GRAVITY = v; world.gravity.y = -v; } },
          ],
        },
        {
          title: 'Hover',
          controls: [
            { label: 'Radius',        min: 0.5, max: 10,  step: 0.1, fmt: 1,
              get: () => PROXIMITY_RADIUS,
              set: v => { PROXIMITY_RADIUS = v; } },
            { label: 'Offset',        min: 0,   max: 1.5, step: 0.05, fmt: 2,
              get: () => PROXIMITY_MAX_OFFSET,
              set: v => { PROXIMITY_MAX_OFFSET = v; } },
          ],
        },
      ];

      function makeRow(ctl) {
        const row = document.createElement('div');
        row.className = 'cp-row';

        const label = document.createElement('span');
        label.className = 'cp-label';
        label.textContent = ctl.label;

        const value = document.createElement('span');
        value.className = 'cp-value';

        const input = document.createElement('input');
        input.type = 'range';
        input.min = String(ctl.min);
        input.max = String(ctl.max);
        input.step = String(ctl.step);

        const fmt = (v) => ctl.fmt === 0 ? Math.round(v).toString()
                        : ctl.fmt === 1 ? v.toFixed(1)
                        : v.toFixed(2);
        const updateFill = () => {
          const pct = ((parseFloat(input.value) - ctl.min) / (ctl.max - ctl.min)) * 100;
          input.style.setProperty('--fill', `${pct}%`);
        };

        const initial = ctl.get();
        input.value = String(initial);
        value.textContent = fmt(initial);
        updateFill();

        input.addEventListener('input', () => {
          const v = parseFloat(input.value);
          ctl.set(v);
          value.textContent = fmt(v);
          updateFill();
          persistValues(); // save to localStorage so values survive reload
        });

        row.appendChild(label);
        row.appendChild(value);
        row.appendChild(input);
        return row;
      }

      for (const section of sections) {
        const titleEl = document.createElement('div');
        titleEl.className = 'cp-section';
        titleEl.textContent = section.title;
        body.appendChild(titleEl);
        for (const ctl of section.controls) body.appendChild(makeRow(ctl));
      }

      // Reset to defaults — clears persisted values AND reloads the page so
      // the wall is rebuilt with the in-code defaults.
      const resetBtn = document.createElement('button');
      resetBtn.className = 'cp-button';
      resetBtn.textContent = 'Reset to Defaults';
      resetBtn.addEventListener('click', () => {
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) { /* ignore */ }
        location.reload();
      });
      body.appendChild(resetBtn);
    }
    buildControlPanel();
  </script>
</body>

</html>
